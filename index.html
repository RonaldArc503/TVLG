<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, initial-scale=1.0" />
  <title>REX</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23080810'/%3E%3Cpath d='M8 24V8h9.2c4 0 6.3 2 6.3 5.2 0 2.4-1.3 4-3.5 4.8L24 24h-4.6l-3.2-5.1H12V24H8Zm4-8.2h4.4c2 0 3.1-.8 3.1-2.4S18.4 11 16.4 11H12v4.8Z' fill='%23e50914'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="splash">
    <div class="splash-logo">REX</div>
    <div class="splash-tagline">Tu cine en casa</div>
    <div class="splash-spinner"></div>
  </div>

  <div id="app" style="display:none">
    <nav id="navbar">
      <div class="nav-logo">REX</div>
      <div class="nav-links">
        <button class="nav-btn active focusable" data-view="home" id="nav-home">Inicio</button>
        <button class="nav-btn focusable" data-view="search" id="nav-search">Buscar</button>
      </div>
      <div id="nav-clock" class="nav-clock">00:00</div>
    </nav>

    <div id="view-home" class="view">
      <div id="home-sections"></div>
      <div id="home-loader" class="loader-overlay" style="display:none">
        <div class="spinner"></div>
      </div>
    </div>

    <div id="view-search" class="view" style="display:none">
      <div class="search-header">
        <div class="search-box-wrap">
          <span class="search-icon">Buscar</span>
          <input
            id="search-input"
            type="text"
            class="search-input"
            placeholder="Buscar peliculas, series, animes..."
            autocomplete="off"
            spellcheck="false"
          />
          <button id="search-clear" class="search-clear focusable" style="display:none" aria-label="Limpiar busqueda">X</button>
        </div>
        <div id="keyboard" class="keyboard"></div>
      </div>
      <div id="search-results"></div>
      <div id="search-loader" class="loader-overlay" style="display:none">
        <div class="spinner"></div>
      </div>
    </div>

    <div id="detail-slot"></div>

    <div id="view-player" class="view" style="display:none">
      <div id="player-controls" class="player-controls">
        <div class="player-controls-top">
          <button id="player-back" class="player-back focusable" aria-label="Volver">&lt;</button>
          <div class="player-heading">
            <span id="player-title" class="player-title"></span>
            <span id="player-meta" class="player-meta"></span>
          </div>
        </div>
        <div class="player-controls-bottom">
          <div id="player-actions" class="player-actions">
            <button id="player-play" class="player-action-btn focusable player-primary-action" aria-label="Reproducir">
              &#9654; Reproducir
            </button>
            <button id="player-retry" class="player-action-btn focusable" aria-label="Recargar servidor">
              &#8635; Recargar
            </button>
            <button id="player-mute-toggle" class="player-action-btn focusable" aria-label="Cambiar modo de autoplay">
              🔊 Con Audio
            </button>
          </div>
          <div id="player-servers" class="player-servers"></div>
        </div>
      </div>

      <!-- Overlay: solo visible al inicio, NO bloquea el iframe -->
      <div id="player-overlay" class="player-overlay is-hidden" data-mode="loading">
        <div class="player-overlay-panel">
          <div class="player-badge">REX PLAYER</div>
          <h2 class="player-overlay-title">Cargando reproduccion</h2>
          <p id="player-status" class="player-status">Conectando con el servidor</p>
        </div>
      </div>

      <!--
        IMPORTANTE: iframe con allow="autoplay" es CRÍTICO para que el video
        dentro del iframe pueda reproducirse automáticamente.
        allowfullscreen también es necesario.
      -->
      <iframe
        id="player-frame"
        class="player-frame"
        src="about:blank"
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture; clipboard-write"
        allowfullscreen
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-presentation allow-top-navigation-by-user-activation"
      ></iframe>

      <video
        id="player-video"
        class="player-video"
        playsinline
        webkit-playsinline
        preload="auto"
        style="display:none"
      ></video>

      <div id="next-ep-overlay">
        <div class="next-ep-progress">
          <div class="next-ep-progress-bar" style="width:100%"></div>
        </div>
        <div class="next-ep-header">
          <div class="next-ep-label">A continuacion</div>
          <div class="next-ep-title">Cargando...</div>
          <div class="next-ep-meta"></div>
        </div>
        <div class="next-ep-actions">
          <button id="btn-next-ep" class="btn-next-ep focusable">
            &#9654; Reproducir ahora
            <span class="next-ep-countdown">15</span>
          </button>
          <button id="btn-dismiss-next" class="btn-dismiss-next focusable">Ignorar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/home.js"></script>
  <script src="js/detail.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
